name: Sync to Hugging Face hub
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v3
        with:
          path: main-repo

      - name: Checkout Hugging Face Repo
        run: |
          git clone https://mmorullo:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/mmorullo/CodeAI-Detector hf-repo

      - name: Sync and Push
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          
          # Sincronizar archivos EXCEPTO .git y model
          # La clave es NO usar --delete en rsync para que no borre lo que ya hay en HF
          rsync -av --progress --exclude '.git' --exclude 'model/' main-repo/ hf-repo/
          
          cd hf-repo
          # Forzamos a Git a añadir todo EXCEPTO la carpeta model
          # Así la carpeta model que subiste a mano nunca se toca
          git add .
          git reset model/ || echo "No model folder tracked"
          
          git commit -m "Actualización segura de código (preservando modelo manual)" || echo "No changes to commit"
          git push origin main
