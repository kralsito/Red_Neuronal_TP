name: Sync to Hugging Face hub
on:
  push:
    branches: [main, master]
  # Permite correrlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          rm -rf model/
          git add .
          git commit -m "Excluyendo binarios para Hugging Face" || echo "No hay cambios para commitear"
          git push --force https://mmorullo:$HF_TOKEN@huggingface.co/spaces/mmorullo/CodeAI-Detector main
